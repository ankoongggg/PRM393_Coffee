<!DOCTYPE html>
<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đăng nhập - Coffee Shop Management</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "sage": "#86a686",
                        "sage-dark": "#6b8e6b",
                        "off-white": "#fcfaf7",
                        "surface": "#ffffff",
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        :root {
            --flutter-elevation-1: 0px 2px 4px rgba(0, 0, 0, 0.05);
            --flutter-elevation-3: 0px 4px 8px rgba(0, 0, 0, 0.12);
            --flutter-elevation-button: 0px 4px 6px rgba(134, 166, 134, 0.3);
        }.flutter-input {
            @apply block w-full px-4 py-4 bg-transparent border-gray-300 rounded-xl transition-all duration-200;
            border-width: 1px;
        }
        .flutter-input:focus {
            @apply ring-0 border-sage border-2;
            outline: none;
        }.material-button {
            box-shadow: var(--flutter-elevation-button);
            @apply active:scale-[0.98] transition-all;
        }.stack-background {
            background: radial-gradient(circle at 10% 20%, rgba(134, 166, 134, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(134, 166, 134, 0.05) 0%, transparent 40%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-off-white font-sans text-gray-800 antialiased overflow-x-hidden">
<div class="relative min-h-screen flex flex-col stack-background">
<div class="flex flex-col items-center pt-16 pb-10 px-6">
<div class="w-20 h-20 bg-sage/10 rounded-3xl flex items-center justify-center mb-6 shadow-sm border border-sage/20">
<span class="material-symbols-outlined text-sage text-4xl">coffee</span>
</div>
<h1 class="text-3xl font-bold tracking-tight text-gray-900 mb-2">Xin chào!</h1>
<p class="text-gray-500 text-center max-w-[260px] leading-relaxed">
                Hệ thống Quản lý Cửa hàng Cà phê cho doanh nghiệp
            </p>
</div>
<main class="flex-1 px-6 max-w-md mx-auto w-full">
<div class="space-y-5">
<div class="relative">
<label class="absolute -top-2.5 left-3 px-1.5 bg-off-white text-xs font-medium text-sage z-10">Tên đăng nhập</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">person</span>
<input class="flutter-input pl-12 placeholder-gray-400" placeholder="" type="text"/>
</div>
</div>
<div class="relative">
<label class="absolute -top-2.5 left-3 px-1.5 bg-off-white text-xs font-medium text-sage z-10">Mật khẩu</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">lock</span>
<input class="flutter-input pl-12 pr-12 placeholder-gray-400" placeholder="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="flex justify-end">
<button class="text-sm font-semibold text-sage hover:text-sage-dark">
                        Quên mật khẩu?
                    </button>
</div>
<div class="pt-4">
<button class="material-button w-full bg-sage hover:bg-sage-dark text-white font-bold py-4 rounded-xl text-lg tracking-wide">
                        ĐĂNG NHẬP
                    </button>
</div>
</div>
<div class="mt-12 flex flex-col items-center">
<div class="flex items-center gap-4 w-full mb-8">
<div class="h-[1px] bg-gray-200 flex-1"></div>
<span class="text-gray-400 text-xs font-medium">HOẶC TIẾP TỤC VỚI</span>
<div class="h-[1px] bg-gray-200 flex-1"></div>
</div>
<div class="flex gap-4">
<button class="w-14 h-14 rounded-full bg-white border border-gray-100 flex items-center justify-center shadow-sm active:bg-gray-50">
<img alt="Google" class="w-6 h-6" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCuItK6CACH5lZqPl5W2IbzAi1ablUweMGF0Dk4-Fu_j3oREyDzNJjGSJo4G3KGsaFFWX9h96I27qcbdXP05coFM_6WUiCKFXbF3TQtaOd0_Qyli7k-BPAQNez-b28GnSBJXDgb4-mg9WmMWguJlitOBPUizsDYiTu-tzXiHsjEyEJcZsQw8G8PzeS2FiJaOiyGXiawVvLiJTj2g-JTQrqECKWlW_4MTzTRAgNgQ_PPMlfqjwJHLKipWbkXayHboeb7TOgUrUZHUsY"/>
</button>
<button class="w-14 h-14 rounded-full bg-white border border-gray-100 flex items-center justify-center shadow-sm active:bg-gray-50">
<span class="material-symbols-outlined text-blue-600">fingerprint</span>
</button>
</div>
</div>
</main>
<footer class="p-8 text-center">
<p class="text-gray-400 text-xs mb-2">Hỗ trợ kỹ thuật 24/7</p>
<div class="flex items-center justify-center gap-1 text-sage font-semibold text-sm">
<span class="material-symbols-outlined text-sm">call</span>
<span>1900 1234</span>
</div>
<div class="h-6"></div>
</footer>
</div>

</body></html>
