<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#d47311",
                        "background-light": "#f8f7f6",
                        "sheet-bg": "#ffffff",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer base {
            body {
                @apply font-display antialiased;
            }
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }.modal-overlay {
            background-color: rgba(0, 0, 0, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-stone-200">
<div class="relative flex min-h-screen w-full flex-col items-center justify-end modal-overlay">
<div class="flex flex-col w-full max-w-md bg-sheet-bg rounded-t-[28px] overflow-hidden max-h-[92vh] shadow-2xl relative">
<div class="flex flex-col items-center pt-3 pb-1 shrink-0">
<div class="h-1 w-10 rounded-full bg-stone-300"></div>
</div>
<div class="flex items-center px-4 py-2 justify-between shrink-0">
<button class="flex size-10 items-center justify-center rounded-full active:bg-stone-100 transition-colors">
<span class="material-symbols-outlined text-stone-600">close</span>
</button>
<h2 class="text-stone-900 text-lg font-semibold flex-1 text-center">Order Item Details</h2>
<div class="w-10"></div> 
</div>
<div class="flex-1 overflow-y-auto no-scrollbar pb-40">
<div class="px-4 py-2">
<div class="aspect-[16/9] w-full rounded-2xl overflow-hidden relative shadow-sm">
<img alt="Product Image" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBp6UPZO7Xh5VvPFtZL2c36pwmbtvGZVpY4XqD_0-y1G91mIiXXJWk7tNgKHu2De15FHcTuEGVplZlEQPHpvq5kLP7CHLCip_knbAvIfjv3ZDlTwpsxZWA_dFd4uJ1kN7qeTg-Iw6IruWLzbF-um3JbC35s7hB4WR5TfOyuvHV_B9kMUBXbPljIepWidVJ4dlLaJTg0VL_gKjGIep8qbl_6dpDj71sSeT5tJiVgwfSpMpGbt1kUDe2BPylaWLrUhwJvOEvWS_R0-yw"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent flex flex-col justify-end p-4">
<p class="text-white text-2xl font-bold">Phin Sữa Đá</p>
<p class="text-white/90 text-sm">Coffee • Traditional Recipe</p>
</div>
</div>
</div>
<div class="px-5 py-4">
<p class="text-stone-500 text-sm leading-relaxed">
                        Authentic Vietnamese coffee with condensed milk and ice. Robust flavor with a smooth, sweet finish. A classic choice for your morning.
                    </p>
</div>
<div class="px-5 py-3">
<h3 class="text-stone-900 text-base font-bold mb-3">Size Selection</h3>
<div class="flex flex-wrap gap-3">
<button class="flex-1 min-w-[120px] flex items-center justify-between px-4 py-3 rounded-xl border-2 border-primary bg-primary/5 text-primary">
<span class="font-bold">Regular</span>
<span class="text-xs">+0đ</span>
</button>
<button class="flex-1 min-w-[120px] flex items-center justify-between px-4 py-3 rounded-xl border border-stone-200 text-stone-700">
<span class="font-semibold">Large</span>
<span class="text-xs text-stone-500">+10.000đ</span>
</button>
</div>
</div>
<div class="px-5 py-3">
<h3 class="text-stone-900 text-base font-bold mb-3">Sugar Level</h3>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full border border-stone-200 text-stone-600 text-sm font-medium">0%</button>
<button class="px-4 py-2 rounded-full border border-stone-200 text-stone-600 text-sm font-medium">30%</button>
<button class="px-4 py-2 rounded-full border border-stone-200 text-stone-600 text-sm font-medium">50%</button>
<button class="px-4 py-2 rounded-full bg-primary text-white text-sm font-bold shadow-sm">100%</button>
<button class="px-4 py-2 rounded-full border border-stone-200 text-stone-600 text-sm font-medium">Extra</button>
</div>
</div>
<div class="px-5 py-3">
<h3 class="text-stone-900 text-base font-bold mb-3">Ice Level</h3>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full border border-stone-200 text-stone-600 text-sm font-medium">No Ice</button>
<button class="px-4 py-2 rounded-full border border-stone-200 text-stone-600 text-sm font-medium">Less Ice</button>
<button class="px-4 py-2 rounded-full bg-primary text-white text-sm font-bold shadow-sm">Normal Ice</button>
</div>
</div>
<div class="px-5 py-3">
<h3 class="text-stone-900 text-base font-bold mb-3">Special Instructions</h3>
<textarea class="w-full h-24 p-4 rounded-2xl bg-stone-50 border border-stone-200 text-stone-800 text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none resize-none placeholder:text-stone-400" placeholder="e.g. Ít đường, thêm đá, etc."></textarea>
</div>
</div>
<div class="absolute bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-stone-100 px-5 pt-4 pb-8 flex flex-col gap-4 shadow-[0_-4px_20px_-10px_rgba(0,0,0,0.1)]">
<div class="flex items-center justify-between">
<div class="flex items-center gap-4 bg-stone-100 rounded-full px-2 py-1.5">
<button class="flex size-10 items-center justify-center rounded-full bg-white text-stone-900 shadow-sm active:scale-95 transition-transform">
<span class="material-symbols-outlined">remove</span>
</button>
<span class="text-lg font-bold w-6 text-center text-stone-900">1</span>
<button class="flex size-10 items-center justify-center rounded-full bg-primary text-white shadow-sm active:scale-95 transition-transform">
<span class="material-symbols-outlined">add</span>
</button>
</div>
<div class="text-right">
<p class="text-[10px] text-stone-400 font-bold uppercase tracking-wider">Total Price</p>
<p class="text-2xl font-black text-primary">29.000đ</p>
</div>
</div>
<button class="w-full bg-primary h-14 rounded-2xl text-white font-bold text-lg shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">shopping_basket</span>
                    Add to Order
                </button>
</div>
</div>
</div>

</body></html>
