<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-fixed": "#002204",
              "outline": "#827471",
              "on-primary-fixed": "#2b1611",
              "on-tertiary": "#ffffff",
              "secondary-fixed": "#a3f69c",
              "primary-fixed-dim": "#e5beb5",
              "on-error-container": "#93000a",
              "error-container": "#ffdad6",
              "on-tertiary-fixed": "#001b3d",
              "on-primary-fixed-variant": "#5c403a",
              "on-secondary-fixed-variant": "#005312",
              "surface-container-high": "#eae8e4",
              "outline-variant": "#d4c3bf",
              "tertiary-fixed": "#d6e3ff",
              "surface-bright": "#fbf9f5",
              "primary": "#361f1a",
              "error": "#ba1a1a",
              "secondary": "#1b6d24",
              "on-surface": "#1b1c1a",
              "tertiary": "#00244f",
              "primary-container": "#4e342e",
              "on-primary": "#ffffff",
              "inverse-surface": "#30312e",
              "surface-container-lowest": "#ffffff",
              "surface": "#fbf9f5",
              "tertiary-fixed-dim": "#a9c7ff",
              "secondary-fixed-dim": "#88d982",
              "on-secondary-container": "#217128",
              "on-primary-container": "#c19c94",
              "inverse-primary": "#e5beb5",
              "surface-dim": "#dbdad6",
              "on-error": "#ffffff",
              "secondary-container": "#a0f399",
              "surface-container-highest": "#e4e2de",
              "on-tertiary-container": "#6ca5ff",
              "on-secondary": "#ffffff",
              "on-tertiary-fixed-variant": "#00468c",
              "primary-fixed": "#ffdad2",
              "surface-variant": "#e4e2de",
              "inverse-on-surface": "#f2f0ed",
              "surface-container-low": "#f5f3ef",
              "on-surface-variant": "#504442",
              "tertiary-container": "#003a76",
              "on-background": "#1b1c1a",
              "background": "#fbf9f5",
              "surface-tint": "#755750",
              "surface-container": "#efeeea"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "3xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-blur-circle-1 {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(163, 246, 156, 0.15) 0%, rgba(163, 246, 156, 0) 70%);
            filter: blur(60px);
            z-index: -1;
            top: -100px;
            right: -100px;
        }
        .bg-blur-circle-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(214, 227, 255, 0.12) 0%, rgba(214, 227, 255, 0) 70%);
            filter: blur(80px);
            z-index: -1;
            bottom: -150px;
            left: -150px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen selection:bg-primary-fixed-dim selection:text-on-primary-fixed overflow-x-hidden">
<!-- Decorative Blurs -->
<div class="bg-blur-circle-1"></div>
<div class="bg-blur-circle-2"></div>
<main class="relative z-10 flex flex-col items-center justify-center min-h-screen px-6 py-12">
<!-- Hero Section -->
<header class="text-center mb-16 animate-fade-in">
<div class="inline-flex items-center justify-center w-24 h-24 bg-surface-container-lowest rounded-3xl shadow-[0_20px_40px_rgba(54,31,26,0.06)] mb-8">
<span class="material-symbols-outlined text-primary text-5xl" data-icon="coffee">coffee</span>
</div>
<h1 class="font-headline font-extrabold text-display-sm tracking-tight text-primary mb-2">
                PRM393 Coffee
            </h1>
<p class="font-label text-label-md tracking-[0.2em] text-outline uppercase">
                HỆ THỐNG QUẢN LÝ QUÁN CÀ PHÊ
            </p>
</header>
<!-- Role Selection Container (Initial State) -->
<section class="w-full max-w-md space-y-8" id="role-selection">
<div class="text-center mb-6">
<h2 class="font-headline text-headline-sm text-on-surface">Chọn vai trò để đăng nhập</h2>
</div>
<div class="grid gap-4">
<!-- Manager Card -->
<button class="group flex items-center justify-between p-6 bg-surface-container-lowest rounded-2xl shadow-[0_4px_20px_rgba(54,31,26,0.02)] border border-transparent hover:border-outline-variant transition-all duration-300 active:scale-95 text-left w-full">
<div class="flex items-center gap-5">
<div class="w-14 h-14 rounded-2xl bg-surface-container flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-3xl" data-icon="admin_panel_settings">admin_panel_settings</span>
</div>
<div>
<h3 class="font-headline text-title-medium text-on-surface font-bold">Manager</h3>
<p class="text-on-surface-variant text-body-small">Quản lý cửa hàng &amp; báo cáo</p>
</div>
</div>
<span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Waiter Card -->
<button class="group flex items-center justify-between p-6 bg-surface-container-lowest rounded-2xl shadow-[0_4px_20px_rgba(54,31,26,0.02)] border border-transparent hover:border-outline-variant transition-all duration-300 active:scale-95 text-left w-full">
<div class="flex items-center gap-5">
<div class="w-14 h-14 rounded-2xl bg-secondary-container/30 flex items-center justify-center text-on-secondary-container">
<span class="material-symbols-outlined text-3xl" data-icon="restaurant">restaurant</span>
</div>
<div>
<h3 class="font-headline text-title-medium text-on-surface font-bold">Waiter</h3>
<p class="text-on-surface-variant text-body-small">Đặt món &amp; phục vụ bàn</p>
</div>
</div>
<span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Barista Card -->
<button class="group flex items-center justify-between p-6 bg-surface-container-lowest rounded-2xl shadow-[0_4px_20px_rgba(54,31,26,0.02)] border border-transparent hover:border-outline-variant transition-all duration-300 active:scale-95 text-left w-full">
<div class="flex items-center gap-5">
<div class="w-14 h-14 rounded-2xl bg-tertiary-container/10 flex items-center justify-center text-tertiary">
<span class="material-symbols-outlined text-3xl" data-icon="coffee_maker">coffee_maker</span>
</div>
<div>
<h3 class="font-headline text-title-medium text-on-surface font-bold">Barista</h3>
<p class="text-on-surface-variant text-body-small">Chế biến đồ uống &amp; kho</p>
</div>
</div>
<span class="material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</section>
<!-- Login Form (Shown when role selected) -->
<!-- For demo, we keep it in the same page but it would typically be a transition -->
<section class="hidden w-full max-w-md mt-12" id="login-container">
<div class="bg-surface-container-lowest p-8 rounded-3xl shadow-[0_20px_40px_rgba(54,31,26,0.06)] border border-outline-variant/10">
<button class="inline-flex items-center gap-2 text-primary font-medium mb-8 hover:opacity-70 transition-opacity">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
<span class="font-label text-label-large">Quay lại</span>
</button>
<h2 class="font-headline text-headline-small text-primary font-bold mb-2">Đăng nhập</h2>
<p class="text-on-surface-variant mb-8">Vui lòng nhập thông tin tài khoản của bạn.</p>
<form class="space-y-6">
<div class="space-y-2">
<label class="block font-label text-label-medium text-on-surface ml-1">Email</label>
<input class="w-full px-5 py-4 bg-surface-container-high rounded-2xl border-none focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-highest transition-all outline-none text-on-surface" placeholder="manager@prm393.coffee" type="email"/>
</div>
<div class="space-y-2">
<label class="block font-label text-label-medium text-on-surface ml-1">Mật khẩu</label>
<div class="relative">
<input class="w-full px-5 py-4 bg-surface-container-high rounded-2xl border-none focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-highest transition-all outline-none text-on-surface" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="pt-4">
<button class="w-full py-5 bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold text-title-medium rounded-2xl shadow-lg shadow-primary/10 hover:shadow-primary/20 transition-all duration-300 active:scale-[0.98]" type="submit">
                            Đăng nhập
                        </button>
</div>
</form>
<div class="mt-8 text-center">
<a class="text-label-medium text-primary/60 hover:text-primary transition-colors" href="#">Quên mật khẩu?</a>
</div>
</div>
</section>
<!-- Decorative Footer Text -->
<footer class="mt-12 text-center">
<p class="text-label-small text-outline/50 tracking-widest uppercase">© 2024 PRM393 Roastery • Professional Edition</p>
</footer>
</main>
<!-- Script to simulate role selection transition -->
<script>
        document.querySelectorAll('#role-selection button').forEach(button => {
            button.addEventListener('click', () => {
                const role = button.querySelector('h3').textContent;
                document.getElementById('role-selection').classList.add('hidden');
                document.getElementById('login-container').classList.remove('hidden');
                document.querySelector('#login-container h2').textContent = `Đăng nhập ${role}`;
            });
        });

        document.querySelector('#login-container button[class*="text-primary"]').addEventListener('click', () => {
            document.getElementById('login-container').classList.add('hidden');
            document.getElementById('role-selection').classList.remove('hidden');
        });
    </script>
</body></html>
